<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Save Employee</title>

    <style>
        body {
            background-color: #f4f6f9;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Center the form using Bootstrap Grid -->
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white pt-3 pb-2">
                    <h4 class="mb-0"><i class="bi bi-person-lines-fill me-2"></i> Employee Details</h4>
                </div>

                <div class="card-body p-4">
                    <form action="#" th:action="@{/employees/save}" th:object="${employee}" method="POST">

                        <!-- Add hidden form field to handle update -->
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="firstName" class="form-label fw-bold text-secondary">First Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" id="firstName" th:field="*{firstName}"
                                       class="form-control" placeholder="e.g. John" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label fw-bold text-secondary">Last Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person-badge"></i></span>
                                <input type="text" id="lastName" th:field="*{lastName}"
                                       class="form-control" placeholder="e.g. Doe" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold text-secondary">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" th:field="*{email}"
                                       class="form-control" placeholder="e.g. john.doe@example.com" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                            <a th:href="@{/employees/list}" class="btn btn-light me-md-2 border">
                                <i class="bi bi-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save me-1"></i> Save Employee
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
