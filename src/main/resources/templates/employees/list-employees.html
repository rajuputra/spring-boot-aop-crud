<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

	<title>Employee Directory</title>

	<style>
		body {
            background-color: #f4f6f9; /* Memberikan background abu-abu muda */
        }
        .table-custom th {
            background-color: #2c3e50;
            color: white;
        }
	</style>
</head>

<body>

<div class="container mt-5">

	<div class="card shadow-sm border-0">
		<div class="card-header bg-white pt-4 pb-3 border-bottom-0">
			<h3 class="card-title text-primary"><i class="bi bi-people-fill me-2"></i>Employee Directory</h3>
			<p class="text-muted small">Manage your enterprise employee data efficiently.</p>
		</div>

		<div class="card-body">
			<!-- Add a button -->
			<a th:href="@{/employees/showFormForAdd}" class="btn btn-primary mb-4 shadow-sm">
				<i class="bi bi-person-plus-fill me-1"></i> Add New Employee
			</a>

			<div class="table-responsive">
				<table class="table table-hover align-middle table-bordered">
					<thead class="table-custom">
					<tr>
						<th class="py-3">First Name</th>
						<th class="py-3">Last Name</th>
						<th class="py-3">Email</th>
						<th class="py-3 text-center" style="width: 200px;">Actions</th>
					</tr>
					</thead>

					<tbody>
					<tr th:each="tempEmployee : ${employees}">
						<td class="fw-semibold text-secondary" th:text="${tempEmployee.firstName}" />
						<td class="fw-semibold text-secondary" th:text="${tempEmployee.lastName}" />
						<td th:text="${tempEmployee.email}" />

						<td class="text-center">
							<!-- Update button -->
							<a th:href="@{/employees/showFormForUpdate(employeeId=${tempEmployee.id})}"
							   class="btn btn-outline-info btn-sm me-1" title="Update">
								<i class="bi bi-pencil-square"></i> Edit
							</a>

							<!-- Delete button -->
							<a th:href="@{/employees/delete(employeeId=${tempEmployee.id})}"
							   class="btn btn-outline-danger btn-sm" title="Delete"
							   onclick="if (!(confirm('Are you sure you want to delete this employee?'))) return false">
								<i class="bi bi-trash3-fill"></i>
							</a>
						</td>
					</tr>

					<!-- Empty state handling if list is empty -->
					<tr th:if="${#lists.isEmpty(employees)}">
						<td colspan="4" class="text-center py-4 text-muted">
							<i class="bi bi-inbox fs-2 d-block mb-2"></i>
							No employees found. Start by adding a new one!
						</td>
					</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
